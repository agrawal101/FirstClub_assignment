spring:
  application:
    name: membership

  datasource:
    url: jdbc:h2:mem:membership;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jackson:
    mapper:
      accept-case-insensitive-enums: true

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.firstclub.membership: INFO